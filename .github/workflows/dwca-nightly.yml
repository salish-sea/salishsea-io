name: DwC-A Nightly

on:
    schedule:
        - cron: '0 9 * * *'  # 09:00 UTC = 02:00 PT (PDT) / 01:00 PT (PST)
    workflow_dispatch:

concurrency:
    group: dwca-nightly
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: production
        permissions:
            id-token: write
            contents: read
            issues: write  # for O-01 failure issue
        env:
            ZIP_FLOOR_BYTES: '51200'       # G-02: 50 KB
            PARQUET_FLOOR_BYTES: '10240'   # G-02: 10 KB
            ROW_FLOOR: '1000'              # G-02: 1 000 occurrences

        steps:
            - name: Checkout repo
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: package.json

            - name: Install dependencies
              run: npm ci

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
              with:
                  role-to-assume: arn:aws:iam::648183724555:role/salishsea-deploy-action
                  aws-region: us-west-2

            # Assemble SUPABASE_DB_URL once for the whole job.
            #
            # Why: the raw DB_PASSWORD contains characters (`@`, possibly `:`/`/`) that
            # have meaning in the userinfo section of a URL. Direct YAML interpolation
            # (`${{ secrets.DB_PASSWORD }}@host`) lets the URL parser see the password's
            # literal `@` as the userinfo terminator, so DuckDB ATTACH ends up trying
            # to resolve `<password-tail>@<real-host>` as a DNS name and fails.
            # Fix: URL-encode the password via Node, register the encoded value with
            # `::add-mask::` so it can't leak in any subsequent step, then export the
            # assembled URL via `$GITHUB_ENV` so Build + Guard see it automatically.
            #
            # Host is the Supabase **session pooler** (port 5432) — direct connections
            # at `db.<ref>.supabase.co` are IPv6-only and GHA runners are IPv4. The
            # transaction pooler (port 6543, same host) does NOT preserve session
            # features (prepared statements) that DuckDB's `postgres` ATTACH needs.
            - name: Prepare Postgres DSN
              env:
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
              run: |
                  ENCODED_PW=$(node -e 'process.stdout.write(encodeURIComponent(process.env.DB_PASSWORD))')
                  echo "::add-mask::${ENCODED_PW}"
                  printf 'SUPABASE_DB_URL=postgres://postgres.%s:%s@aws-1-us-west-1.pooler.supabase.com:5432/postgres\n' \
                    "${SUPABASE_PROJECT_ID}" "${ENCODED_PW}" >> "${GITHUB_ENV}"

            - name: Build DwC-A
              run: npm run build:dwca

            - name: Compute checksums
              working-directory: dist/dwca
              run: |
                  sha256sum salishsea-occurrences-v1.zip     > salishsea-occurrences-v1.zip.sha256
                  sha256sum salishsea-occurrences-v1.parquet > salishsea-occurrences-v1.parquet.sha256

            # SUPABASE_DB_URL inherited from the "Prepare Postgres DSN" step via $GITHUB_ENV.
            - name: Guard (G-01..G-04)
              run: npx tsx scripts/dwca/guard.ts

            - name: Publish to S3 (checksum-LAST order, P-02)
              env:
                  DEST: s3://${{ vars.S3_BUCKET }}/site/dwca
              working-directory: dist/dwca
              run: |
                  aws s3 cp salishsea-occurrences-v1.parquet        "${DEST}/"
                  aws s3 cp salishsea-occurrences-v1.zip            "${DEST}/"
                  aws s3 cp salishsea-occurrences-v1.parquet.sha256 "${DEST}/"
                  aws s3 cp salishsea-occurrences-v1.zip.sha256     "${DEST}/"

            - name: Invalidate CloudFront /dwca/*
              id: invalidate
              env:
                  DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
              run: |
                  INVALIDATION_ID=$(aws cloudfront create-invalidation --distribution-id "${DISTRIBUTION_ID}" --paths '/dwca/*' --query 'Invalidation.Id' --output text)
                  echo "id=${INVALIDATION_ID}" >> "$GITHUB_OUTPUT"

            - name: Wait for invalidation
              continue-on-error: true
              env:
                  DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
              run: |
                  aws cloudfront wait invalidation-completed \
                    --distribution-id "${DISTRIBUTION_ID}" \
                    --id "${{ steps.invalidate.outputs.id }}"

            - name: Smoke verify (V-01)
              run: npx tsx scripts/dwca/verify-publish.ts

            - name: Find existing failure issue
              id: find-issue
              if: failure()
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                  script: |
                      const issues = await github.rest.issues.listForRepo({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        state: 'open',
                        labels: 'dwca-nightly-failed',
                        per_page: 1,
                      });
                      core.setOutput('issue-number', issues.data[0]?.number ?? '');

            - name: Open or update failure issue
              if: failure()
              uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
              with:
                  title: "DwC-A nightly publish failed (run ${{ github.run_id }})"
                  content-filepath: ./dist/dwca/guard-diff.txt
                  labels: dwca-nightly-failed
                  issue-number: ${{ steps.find-issue.outputs.issue-number }}
