name: Build

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v1
        with:
          version: 2.53.6
      - run: supabase db start
      - name: Apply CI seed fixture
        run: psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" -v ON_ERROR_STOP=1 -f supabase/ci-seed.sql
      - name: Verify generated types match Postgres schema
        run: |
          npm run gen-types
          if ! git diff --ignore-space-at-eol --exit-code --quiet database.types.ts; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff
            exit 1
          fi

      - run: npm run build
      - name: Run tests
        run: npm test
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres

      - name: Install infra dependencies
        run: npm ci
        working-directory: infra

      - name: Run infra tests
        run: npm test
        working-directory: infra
