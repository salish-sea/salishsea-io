name: Deploy
on:
  push:
    branches:
      - main
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_WS_URL: ${{ vars.VITE_SUPABASE_WS_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts
          path: |
            ./dist
            ./supabase

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6
        with:
          role-to-assume: arn:aws:iam::648183724555:role/salishsea-deploy-action
          aws-region: us-west-2
      - run: ls
      - uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1
        with:
          version: 2.53.6
      - run: supabase link --project-ref "${PROJECT_REF}"
        env:
          PROJECT_REF: ${{ vars.SUPABASE_PROJECT_ID }}
      - run: supabase db push
      - name: Deploy to S3
        run: aws s3 sync --no-progress dist s3://${{ vars.S3_BUCKET }}/site
      - name: Setup Node for CDK
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: package.json
      - name: Deploy CDK infra (CloudFront + Lambda@Edge)
        working-directory: infra
        env:
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
        run: |
          npm ci
          npm run build
          npx cdk deploy --all --require-approval never \
            --context "supabaseAnonKey=${SUPABASE_ANON_KEY}"
