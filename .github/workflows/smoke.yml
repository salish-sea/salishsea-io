name: Smoke Test

on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
  schedule:
    - cron: '0 14 * * *'  # daily at 14:00 UTC (6am PT)
  workflow_dispatch:  # allow manual runs (e.g. to validate after changes)

jobs:
  smoke:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: npm ci

      # `playwright install` intermittently hangs at 100% on the post-download
      # extraction (upstream flake). Cap each attempt and retry so a stuck
      # download can't ride the job to GitHub's 6h ceiling.
      - name: Install Playwright browser
        timeout-minutes: 8
        run: |
          for attempt in 1 2 3; do
            echo "::group::playwright install (attempt $attempt)"
            timeout -k 30s 4m npx playwright install chromium --with-deps && { echo "::endgroup::"; exit 0; }
            echo "::endgroup::"
            echo "Attempt $attempt timed out or failed; retrying..."
          done
          echo "playwright install failed after 3 attempts" >&2
          exit 1

      - name: Run smoke test
        timeout-minutes: 4
        run: npx playwright test
        env:
          BASE_URL: ${{ vars.VITE_BASE_URL }}

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smoke-screenshot
          path: e2e/screenshots/
