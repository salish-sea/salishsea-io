name: Smoke Test

on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
  schedule:
    - cron: '0 14 * * *'  # daily at 14:00 UTC (6am PT)
  workflow_dispatch:  # allow manual runs (e.g. to validate after changes)

jobs:
  smoke:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run in Playwright's official image: browsers and system deps are pre-baked,
    # so there is no `playwright install` step to download/extract (it hangs
    # reproducibly at 100% for some Chrome builds). Keep this tag in sync with the
    # @playwright/test version in package.json -- browser builds are version-locked.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: npm ci

      - name: Run smoke test
        timeout-minutes: 4
        run: npx playwright test
        env:
          # Public production URL. Set as a literal rather than reading
          # vars.VITE_BASE_URL, which would require binding the job to the
          # `production` environment and record a spurious deployment per run.
          BASE_URL: https://salishsea.io

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: smoke-screenshot
          path: e2e/screenshots/
